spring:
  application:
    name: edrive-backend
  datasource:
    url: jdbc:mysql://localhost:3306/edrive
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

encryption:
  rsa-key-size: 4096
  aes-key-size: 256
  gcm-tag-size: 128
  iv-size: 96
  algorithm: AES/GCM/NoPadding
  chunk-size: 4096

certificate:
  main:
    path: certs/main/cert.pem
    key-path: certs/main/key.pem
    duration: 3650
    issuer:
      common-name: Singidunum CA
      org-unit: KIBP
      org: Singidunum
      locality: Belgrade
      state: RS
      country: RS

  inter:
    path: certs/inter/cert.pem
    key-path: certs/inter/key.pem
    duration: 365
    issuer:
      common-name: Singidunum Intermediate
      org-unit: KIBP
      org: Singidunum
      locality: Belgrade
      state: RS
      country: RS